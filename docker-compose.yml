services:
  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: interview_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network
    # SECURE PORT MAPPING: Binds ONLY to localhost (127.0.0.1) on the VPS.
    # The public internet CANNOT access this. It is only accessible via SSH Tunnel (e.g. in Compass).
    ports:
      - "127.0.0.1:27017:27017"

  # ── Backend ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: interview_backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DB_NAME}?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_GENAI_API_KEY: ${GOOGLE_GENAI_API_KEY}
    networks:
      - app_network
    ports:
      - "3000:3000"

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        # Baked into the Vite bundle at build time
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: interview_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app_network
    ports:
      - "80:80"
      - "443:443"
    # Mount SSL certs from the VPS host (read-only for security)
    # Certs are created by: certbot certonly --standalone -d jioclouds.in -d www.jioclouds.in
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro

# ── Volumes ──────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────
networks:
  app_network:
    driver: bridge
