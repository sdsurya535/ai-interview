# ── HTTP → HTTPS Redirect ─────────────────────────────────────────────────
server {
    listen 80;
    server_name jioclouds.in www.jioclouds.in;

    # Redirect all HTTP traffic to HTTPS permanently
    return 301 https://$host$request_uri;
}

# ── HTTPS Server ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name jioclouds.in www.jioclouds.in;

    # SSL Certificate paths (mounted from the VPS via docker-compose volumes)
    ssl_certificate     /etc/letsencrypt/live/jioclouds.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jioclouds.in/privkey.pem;

    # SSL hardening
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root /usr/share/nginx/html;
    index index.html;

    # Handle React Router — all routes fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
